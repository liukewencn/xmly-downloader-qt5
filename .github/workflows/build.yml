name: Build xmly-downloader-qt5 绿色版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 安装 Qt5.15
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          arch: "win64_msvc2019_64"

      - name: 编译 Go 静态库
        run: |
          cd src/cgoqt
          go build -buildmode=c-archive -o xmlydownloader.a

      - name: 编译 Qt 程序
        run: |
          cd src
          qmake xmly-downloader-qt5.pro
          nmake

      - name: 拷贝 exe 到发布目录
        run: |
          mkdir publish
          copy src\release\xmly-downloader-qt5.exe publish\

      - name: 使用 windeployqt 自动拷贝所有Qt依赖DLL
        run: |
          windeployqt publish\xmly-downloader-qt5.exe

      - name: 打包成 ZIP
        run: |
          powershell Compress-Archive -Path publish\* -DestinationPath xmly-downloader-qt5-green.zip

      - name: 上传最终绿色版
        uses: actions/upload-artifact@v4
        with:
          name: xmly-downloader-qt5-green
          path: xmly-downloader-qt5-green.zip
